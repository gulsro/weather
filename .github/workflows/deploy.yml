# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
name: Deploy to Server

# trigger: runs on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest   # github spins up a temporary linux machine

    steps:
      # checkout the code onto the GitHub runner
      - name: Checkout code
        uses: actions/checkout@v4

      #  run tests 
      #pipeline stops if tests fail
      - name: Run tests
        env:
          KEYCLOAK_BROWSER_URL: ${{ secrets.KEYCLOAK_BROWSER_URL }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_REDIRECT_URI: ${{ secrets.KEYCLOAK_REDIRECT_URI }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          DJANGO_SETTINGS_MODULE: weather.settings
        run: |
          pip install -r docker/requirements.txt
          cd weather && python manage.py test

      # ssh into the server and redeploy
      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/weather
            git pull origin main
            docker-compose down
            docker-compose up -d --build
